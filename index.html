<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政治経済〈政治編〉共通テスト対策一問一答 第1〜13講</title>
<style>
:root{
  --bg:#f4f2ee; --card:#ffffff; --text:#2b2a28; --sub:#6b6862;
  --accent:#a8342a; --accent2:#c9573a; --good:#2f7a4f; --bad:#b23b3b; --warn:#c98a1c;
  --border:#e4dfd6; --chip:#efece5; --shadow:0 6px 20px rgba(0,0,0,.08);
}
body.dark{
  --bg:#181615; --card:#242220; --text:#efe9e0; --sub:#a89f92;
  --accent:#e07a5f; --accent2:#e0a25f; --good:#5fd18a; --bad:#e07a7a; --warn:#f0c26a;
  --border:#38342f; --chip:#2c2a27; --shadow:0 6px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;}
body{
  margin:0; font-family:"Hiragino Sans","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg); color:var(--text); transition:background .25s,color .25s;
  min-height:100vh; padding-bottom:60px;
}
header{ padding:20px 16px 12px; text-align:center; position:relative; border-bottom:1px solid var(--border); }
header h1{margin:0; font-size:1.25rem; letter-spacing:.02em;}
header p{margin:6px 0 0; color:var(--sub); font-size:.78rem;}
#theme-toggle{
  position:absolute; top:16px; right:16px; background:var(--chip); border:1px solid var(--border);
  color:var(--text); border-radius:20px; padding:6px 12px; cursor:pointer; font-size:.78rem;
}
main{max-width:760px; margin:0 auto; padding:16px;}

.tabs{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:10px;}
.tab-btn{
  padding:6px 11px; border-radius:16px; border:1px solid var(--border); background:var(--card);
  color:var(--text); font-size:.76rem; cursor:pointer; font-weight:600;
}
.tab-btn.active{background:var(--accent); color:#fff; border-color:var(--accent);}
.lecture-title{ text-align:center; font-size:.8rem; color:var(--sub); margin-bottom:12px; font-weight:600; }

.toolbar{
  display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:space-between;
  margin-bottom:14px; background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:10px 12px; box-shadow:var(--shadow);
}
.toolbar-group{display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
.mini-btn{
  padding:7px 11px; border-radius:10px; border:1px solid var(--border); background:var(--chip);
  color:var(--text); font-size:.76rem; cursor:pointer; white-space:nowrap;
}
.mini-btn.on{background:var(--accent); color:#fff; border-color:var(--accent);}
#search{
  flex:1; min-width:110px; padding:8px 10px; border-radius:10px; border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-size:.8rem;
}

.statbar{
  display:flex; justify-content:space-between; align-items:center; font-size:.74rem;
  color:var(--sub); margin-bottom:8px; padding:0 4px; flex-wrap:wrap; gap:4px;
}
.progress-outer{ width:100%; height:8px; background:var(--chip); border-radius:6px; overflow:hidden; margin-bottom:14px; }
.progress-inner{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0%; transition:width .3s;}

#card-wrap{display:flex; flex-direction:column; align-items:center; gap:12px;}
.qcard{
  width:100%; max-width:640px; background:var(--card); border:1px solid var(--border);
  border-radius:20px; box-shadow:var(--shadow); padding:22px 20px; position:relative;
}
.badge-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.type-badge{
  font-size:.68rem; font-weight:700; padding:3px 9px; border-radius:10px; background:var(--chip); color:var(--sub);
}
.type-badge.tf{color:#7a5aa8;}
.type-badge.c2{color:#1f7a9c;}
.type-badge.c4{color:var(--accent2);}
.card-index{ font-size:.7rem; color:var(--sub); }
.q-text{font-size:1.04rem; font-weight:700; line-height:1.7; white-space:pre-wrap; margin-bottom:16px;}
.choices{ display:flex; flex-direction:column; gap:9px; }
.choice-btn{
  text-align:left; padding:12px 14px; border-radius:12px; border:1.5px solid var(--border);
  background:var(--bg); color:var(--text); font-size:.92rem; cursor:pointer; line-height:1.5;
  transition:.12s;
}
.choice-btn:hover{ border-color:var(--accent2); }
.choice-btn.correct{ background:var(--good); color:#fff; border-color:var(--good); }
.choice-btn.wrong{ background:var(--bad); color:#fff; border-color:var(--bad); }
.choice-btn.dim{ opacity:.55; }
.choice-btn:disabled{ cursor:default; }
.idk-btn{
  width:100%; margin-top:4px; padding:11px 14px; border-radius:12px; border:1.5px dashed var(--sub);
  background:transparent; color:var(--sub); font-size:.86rem; cursor:pointer; font-weight:600;
}
.idk-btn:hover{ color:var(--text); border-color:var(--text); }
.idk-btn:disabled{ cursor:default; opacity:.4; }
.explain{
  margin-top:14px; padding-top:12px; border-top:1px dashed var(--border);
  font-size:.86rem; color:var(--sub); display:none;
}
.explain.show{display:block;}
.explain b{color:var(--accent);}
.cat-tag{ font-size:.66rem; color:var(--sub); margin-top:6px; }

.nav-row{display:flex; gap:10px; width:100%; max-width:640px; justify-content:center;}
.nav-btn{
  padding:9px 18px; border-radius:12px; border:1px solid var(--border); background:var(--chip);
  color:var(--text); cursor:pointer; font-size:.8rem;
}
.nav-btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); font-weight:700; }

#list-wrap{display:none; flex-direction:column; gap:10px;}
.list-item{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; box-shadow:var(--shadow); }
.list-q{font-weight:700; font-size:.9rem; margin-bottom:6px;}
.list-a{color:var(--accent); font-weight:700; font-size:.88rem; display:none;}
.list-item.open .list-a{display:block;}
.list-meta{font-size:.65rem; color:var(--sub); margin-bottom:4px;}

.empty-msg{text-align:center; color:var(--sub); padding:40px 10px; font-size:.9rem;}
.loaderr{ text-align:center; color:var(--bad); padding:30px 16px; font-size:.85rem; }
footer{text-align:center; color:var(--sub); font-size:.7rem; margin-top:30px; padding:0 20px;}

@media (max-width:480px){
  .q-text{font-size:.98rem;}
  header h1{font-size:1.05rem;}
  .choice-btn{font-size:.88rem;}
}
</style>
</head>
<body>

<header>
  <button id="theme-toggle">🌓 テーマ</button>
  <h1>政治経済〈政治編〉一問一答</h1>
  <p>第1講〜第13講　共通テスト形式（正誤・2択・4択）</p>
</header>

<main>
  <div class="tabs" id="tabs"></div>
  <div class="lecture-title" id="lecture-title"></div>

  <div class="toolbar">
    <div class="toolbar-group">
      <button class="mini-btn" id="mode-toggle">📇 出題モード</button>
      <button class="mini-btn on" id="priority-toggle">🎯 優先出題</button>
      <button class="mini-btn" id="shuffle-toggle">🔀 シャッフル</button>
      <button class="mini-btn" id="review-toggle">⭐ 苦手のみ</button>
    </div>
    <input type="text" id="search" placeholder="🔍 用語・キーワードで検索">
    <div class="toolbar-group">
      <button class="mini-btn" id="reset-btn">↺ この講をリセット</button>
    </div>
  </div>

  <div class="statbar">
    <span id="stat-text">0 / 0 問</span>
    <span id="stat-detail">正答 0｜誤答 0｜未回答 0</span>
  </div>
  <div class="progress-outer"><div class="progress-inner" id="progress-inner"></div></div>

  <div id="card-wrap">
    <div class="qcard" id="qcard">
      <div class="badge-row">
        <span class="type-badge" id="type-badge">-</span>
        <span class="card-index" id="card-index">1 / 1</span>
      </div>
      <div class="q-text" id="q-text">読み込み中...</div>
      <div class="choices" id="choices"></div>
      <button class="idk-btn" id="btn-idk">🤷 わからない（答えを見る）｜キー：0</button>
      <div class="explain" id="explain"></div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="btn-prev">← 前へ</button>
      <button class="nav-btn primary" id="btn-next">次へ →</button>
    </div>
  </div>

  <div id="list-wrap"></div>
</main>

<footer>
  進捗はこの端末のブラウザに自動保存されます。問題データは quiz-data.js に分離されているので、そのファイルを編集すれば問題の追加・修正ができます。
</footer>

<!-- 問題データは別ファイルから読み込み -->
<script src="quiz-data.js"></script>
<script>
if (!window.QUIZ_DATA) {
  document.getElementById('card-wrap').innerHTML =
    '<div class="loaderr">quiz-data.js の読み込みに失敗しました。index.html と quiz-data.js を同じフォルダに置いてください。</div>';
} else {

const LECTURE_TITLES = window.LECTURE_TITLES;
const QUIZ_DATA = window.QUIZ_DATA;

const STORAGE_KEY = "pe_quiz_progress_mc_v3";
let progress = loadProgress();
const ALL_LECTURES = Object.keys(QUIZ_DATA).map(Number).sort((a,b)=>a-b);

let state = { lecture: 1, order: [], pos: 0, mode: 'card', shuffle: false, reviewOnly: false, priority: true, query: "", answered: false };

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  // migrate from older flat-string format if present
  try{
    const old = localStorage.getItem("pe_quiz_progress_mc_v2");
    if(old){
      const oldObj = JSON.parse(old);
      const migrated = {};
      Object.keys(oldObj).forEach(k=>{
        migrated[k] = { status: oldObj[k], count: 1 };
      });
      return migrated;
    }
  }catch(e){}
  return {};
}
function saveProgress(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }
function entryOf(lec, idx){ return progress[lec+"-"+idx] || null; }
function statusOf(lec, idx){ const e = entryOf(lec, idx); return e ? e.status : null; }
function countOf(lec, idx){ const e = entryOf(lec, idx); return e ? (e.count||0) : 0; }
function recordAnswer(lec, idx, status){
  const key = lec+"-"+idx;
  const prevCount = countOf(lec, idx);
  progress[key] = { status: status, count: prevCount + 1 };
  saveProgress();
}

const tabsEl = document.getElementById('tabs');
const lectureTitleEl = document.getElementById('lecture-title');
function renderTabs(){
  tabsEl.innerHTML = '';
  ALL_LECTURES.forEach(lec=>{
    const b = document.createElement('button');
    b.className = 'tab-btn' + (state.lecture===lec ? ' active':'');
    b.textContent = "第"+lec+"講";
    b.onclick = ()=>{ state.lecture = lec; buildOrder(); render(); };
    tabsEl.appendChild(b);
  });
  const b = document.createElement('button');
  b.className = 'tab-btn' + (state.lecture==='all' ? ' active':'');
  b.textContent = '全講';
  b.onclick = ()=>{ state.lecture = 'all'; buildOrder(); render(); };
  tabsEl.appendChild(b);
  lectureTitleEl.textContent = state.lecture === 'all' ? '第1講〜第13講 すべて出題中' : QUIZ_DATA[state.lecture].title;
}

function buildOrder(){
  let list = [];
  const lecs = state.lecture === 'all' ? ALL_LECTURES : [state.lecture];
  lecs.forEach(lec=>{
    QUIZ_DATA[lec].items.forEach((item, idx)=>{
      if(state.query){
        const s = ((item.prompt||item.statement||'') + (item.answer||'') + (item.choices?item.choices.join(''):'')).toLowerCase();
        if(!s.includes(state.query.toLowerCase())) return;
      }
      if(state.reviewOnly){ if(statusOf(lec, idx) !== 'again') return; }
      list.push({lec, idx, count: countOf(lec, idx)});
    });
  });
  if(state.shuffle){
    for(let i=list.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [list[i], list[j]] = [list[j], list[i]]; }
  }
  if(state.priority){
    // stable-sort by attempt count ascending (never-attempted first),
    // preserving shuffle/original relative order within the same count
    list = list
      .map((item, originalIndex)=>({item, originalIndex}))
      .sort((a,b)=> (a.item.count - b.item.count) || (a.originalIndex - b.originalIndex))
      .map(x=>x.item);
  }
  state.order = list;
  state.pos = 0;
}

const qText = document.getElementById('q-text');
const choicesEl = document.getElementById('choices');
const btnIdk = document.getElementById('btn-idk');
const explainEl = document.getElementById('explain');
const typeBadge = document.getElementById('type-badge');
const cardIndex = document.getElementById('card-index');
const statText = document.getElementById('stat-text');
const statDetail = document.getElementById('stat-detail');
const progressInner = document.getElementById('progress-inner');
const cardWrap = document.getElementById('card-wrap');
const listWrap = document.getElementById('list-wrap');
const btnNext = document.getElementById('btn-next');

const TYPE_LABEL = { "4choice":"四択問題", "2choice":"二択問題", "truefalse":"正誤問題" };
const TYPE_CLASS = { "4choice":"c4", "2choice":"c2", "truefalse":"tf" };
const CAT_LABEL = { person:"人物", right:"権利", law:"法律", treaty:"条約・宣言", case:"判例", organization:"組織・機関", cabinet:"内閣", procedure:"訴訟手続き", number:"数字", term:"用語" };

function render(){
  renderTabs();
  updateStats();
  if(state.mode === 'card'){
    cardWrap.style.display = 'flex'; listWrap.style.display = 'none';
    renderCard();
  }else{
    cardWrap.style.display = 'none'; listWrap.style.display = 'flex';
    renderList();
  }
}

function renderCard(){
  state.answered = false;
  explainEl.classList.remove('show');
  explainEl.innerHTML = '';
  choicesEl.innerHTML = '';

  if(state.order.length === 0){
    qText.textContent = "該当する問題がありません。フィルタを確認してください。";
    typeBadge.textContent = '-';
    cardIndex.textContent = "0 / 0";
    return;
  }
  const {lec, idx} = state.order[state.pos];
  const item = QUIZ_DATA[lec].items[idx];
  typeBadge.textContent = TYPE_LABEL[item.type];
  typeBadge.className = 'type-badge ' + TYPE_CLASS[item.type];
  cardIndex.textContent = "第"+lec+"講 " + (state.pos+1) + " / " + state.order.length;
  qText.textContent = item.type === 'truefalse' ? item.statement : item.prompt;

  item.choices.forEach((choiceText, ci)=>{
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choiceText;
    btn.onclick = ()=> selectChoice(lec, idx, item, ci, btn);
    choicesEl.appendChild(btn);
  });

  btnIdk.disabled = false;
  btnIdk.onclick = ()=> selectIdk(lec, idx, item);
}

function selectChoice(lec, idx, item, choiceIndex, btnEl){
  if(state.answered) return;
  state.answered = true;
  const correct = item.correct;
  const buttons = Array.from(choicesEl.children);
  buttons.forEach((b, i)=>{
    b.disabled = true;
    if(i === correct) b.classList.add('correct');
    else if(i === choiceIndex) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  btnIdk.disabled = true;
  const isCorrect = (choiceIndex === correct);
  recordAnswer(lec, idx, isCorrect ? 'good' : 'again');
  explainEl.classList.add('show');
  const catLabel = CAT_LABEL[item.category] || '';
  explainEl.innerHTML = (isCorrect ? "✅ 正解！" : "❌ 不正解。") + " 正しい内容：<b>" + item.answer + "</b>" +
    (catLabel ? '<div class="cat-tag">分類：' + catLabel + '</div>' : '');
  updateStats();
}

function selectIdk(lec, idx, item){
  if(state.answered) return;
  state.answered = true;
  const correct = item.correct;
  const buttons = Array.from(choicesEl.children);
  buttons.forEach((b, i)=>{
    b.disabled = true;
    if(i === correct) b.classList.add('correct');
    else b.classList.add('dim');
  });
  btnIdk.disabled = true;
  recordAnswer(lec, idx, 'again');
  explainEl.classList.add('show');
  const catLabel = CAT_LABEL[item.category] || '';
  explainEl.innerHTML = "🤷 わからない — 正しい内容：<b>" + item.answer + "</b>" +
    (catLabel ? '<div class="cat-tag">分類：' + catLabel + '</div>' : '');
  updateStats();
}

function renderList(){
  listWrap.innerHTML = '';
  if(state.order.length === 0){
    listWrap.innerHTML = '<div class="empty-msg">該当する問題がありません。フィルタを確認してください。</div>';
    return;
  }
  state.order.forEach(({lec, idx})=>{
    const item = QUIZ_DATA[lec].items[idx];
    const div = document.createElement('div');
    div.className = 'list-item';
    const st = statusOf(lec, idx);
    const cnt = countOf(lec, idx);
    const mark = st === 'good' ? '✅' : st === 'again' ? '⭐' : '・';
    const promptLine = item.type === 'truefalse' ? item.statement : item.prompt;
    const choiceLine = "選択肢： " + item.choices.join(" / ");
    div.innerHTML = `
      <div class="list-meta">第${lec}講 ${mark} ｜ ${TYPE_LABEL[item.type]} ｜ 挑戦回数 ${cnt}</div>
      <div class="list-q">Q. ${promptLine}</div>
      <div class="list-q" style="font-weight:400;color:var(--sub);font-size:.82rem;">${choiceLine}</div>
      <div class="list-a">A. ${item.answer}</div>
    `;
    div.onclick = ()=> div.classList.toggle('open');
    listWrap.appendChild(div);
  });
}

function updateStats(){
  const lecs = state.lecture === 'all' ? ALL_LECTURES : [state.lecture];
  let total=0, good=0, again=0, unseen=0;
  lecs.forEach(lec=>{
    QUIZ_DATA[lec].items.forEach((item, idx)=>{
      total++;
      const st = statusOf(lec, idx);
      if(st==='good') good++; else if(st==='again') again++; else unseen++;
    });
  });
  statText.textContent = `${state.order.length} 問中 ${state.order.length? state.pos+1 : 0} 問目`;
  statDetail.textContent = `正答 ${good}｜誤答 ${again}｜未挑戦 ${unseen}（全 ${total} 問）`;
  progressInner.style.width = total ? ((good/total)*100)+'%' : '0%';
}

document.getElementById('btn-next').onclick = ()=>{
  if(state.order.length === 0) return;
  state.pos = (state.pos + 1) % state.order.length;
  renderCard(); updateStats();
};
document.getElementById('btn-prev').onclick = ()=>{
  if(state.order.length === 0) return;
  state.pos = (state.pos - 1 + state.order.length) % state.order.length;
  renderCard(); updateStats();
};

document.getElementById('mode-toggle').onclick = (e)=>{
  state.mode = state.mode === 'card' ? 'list' : 'card';
  e.target.textContent = state.mode === 'card' ? '📇 出題モード' : '📋 リストモード';
  render();
};
document.getElementById('shuffle-toggle').onclick = (e)=>{
  state.shuffle = !state.shuffle; e.target.classList.toggle('on', state.shuffle);
  buildOrder(); render();
};
document.getElementById('priority-toggle').onclick = (e)=>{
  state.priority = !state.priority; e.target.classList.toggle('on', state.priority);
  buildOrder(); render();
};
document.getElementById('review-toggle').onclick = (e)=>{
  state.reviewOnly = !state.reviewOnly; e.target.classList.toggle('on', state.reviewOnly);
  buildOrder(); render();
};
document.getElementById('search').addEventListener('input', (e)=>{
  state.query = e.target.value; buildOrder(); render();
});
document.getElementById('reset-btn').onclick = ()=>{
  const lecs = state.lecture === 'all' ? ALL_LECTURES : [state.lecture];
  if(!confirm((state.lecture==='all' ? '全講' : '第'+state.lecture+'講') + 'の進捗をリセットします。よろしいですか？')) return;
  lecs.forEach(lec=>{ QUIZ_DATA[lec].items.forEach((item, idx)=>{ delete progress[lec+"-"+idx]; }); });
  saveProgress(); render();
};

document.addEventListener('keydown', (e)=>{
  if(document.activeElement.id === 'search') return;
  if(state.mode !== 'card') return;
  if(['1','2','3','4'].includes(e.key)){
    const i = parseInt(e.key,10)-1;
    const btns = choicesEl.children;
    if(btns[i] && !state.answered) btns[i].click();
  } else if(e.key === '0'){ if(!state.answered) btnIdk.click(); }
  else if(e.key === 'ArrowRight' || e.code === 'Space'){ e.preventDefault(); btnNext.click(); }
  else if(e.key === 'ArrowLeft'){ document.getElementById('btn-prev').click(); }
});

const themeToggle = document.getElementById('theme-toggle');
if(localStorage.getItem('pe_quiz_theme') === 'dark'){ document.body.classList.add('dark'); }
themeToggle.addEventListener('click', ()=>{
  document.body.classList.toggle('dark');
  localStorage.setItem('pe_quiz_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
});

buildOrder();
render();

}
</script>
</body>
</html>
