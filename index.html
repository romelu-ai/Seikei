<style>

*{box-sizing:border-box;}
body{
  margin:0; font-family:"Hiragino Sans","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg); color:var(--text); transition:background .25s,color .25s;
  min-height:100vh; padding-bottom:60px;
}
header{
  padding:22px 16px 14px; text-align:center; position:relative;
  border-bottom:1px solid var(--border);
}
header h1{margin:0; font-size:1.3rem; letter-spacing:.02em;}
header p{margin:6px 0 0; color:var(--sub); font-size:.8rem;}
#theme-toggle{
  position:absolute; top:18px; right:16px; background:var(--chip); border:1px solid var(--border);
  color:var(--text); border-radius:20px; padding:6px 12px; cursor:pointer; font-size:.8rem;
}
main{max-width:760px; margin:0 auto; padding:16px;}

/* Lecture tabs */
.tabs{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:14px;}
.tab-btn{
  padding:7px 12px; border-radius:18px; border:1px solid var(--border); background:var(--card);
  color:var(--text); font-size:.78rem; cursor:pointer; transition:.15s; font-weight:600;
}
.tab-btn.active{background:var(--accent); color:#fff; border-color:var(--accent);}
.lecture-title{
  text-align:center; font-size:.82rem; color:var(--sub); margin-bottom:12px; font-weight:600;
}

/* Toolbar */
.toolbar{
  display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:space-between;
  margin-bottom:14px; background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:10px 12px; box-shadow:var(--shadow);
}
.toolbar-group{display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
.mini-btn{
  padding:7px 11px; border-radius:10px; border:1px solid var(--border); background:var(--chip);
  color:var(--text); font-size:.78rem; cursor:pointer; white-space:nowrap;
}
.mini-btn.on{background:var(--accent); color:#fff; border-color:var(--accent);}
#search{
  flex:1; min-width:120px; padding:8px 10px; border-radius:10px; border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-size:.82rem;
}

/* Stats bar */
.statbar{
  display:flex; justify-content:space-between; align-items:center; font-size:.76rem;
  color:var(--sub); margin-bottom:10px; padding:0 4px; flex-wrap:wrap; gap:4px;
}
.progress-outer{
  width:100%; height:8px; background:var(--chip); border-radius:6px; overflow:hidden; margin-bottom:14px;
}
.progress-inner{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0%; transition:width .3s;}

/* Card mode */
#card-wrap{display:flex; flex-direction:column; align-items:center; gap:14px;}
.flashcard{
  width:100%; max-width:640px; min-height:230px; background:var(--card); border:1px solid var(--border);
  border-radius:20px; box-shadow:var(--shadow); padding:26px 22px; cursor:pointer;
  display:flex; flex-direction:column; justify-content:center; position:relative;
}
.card-label{position:absolute; top:14px; left:18px; font-size:.68rem; color:var(--sub); font-weight:700; letter-spacing:.03em; max-width:60%;}
.card-index{position:absolute; top:14px; right:18px; font-size:.72rem; color:var(--sub);}
.q-text{font-size:1.08rem; font-weight:700; line-height:1.7; margin-top:22px; white-space:pre-wrap;}
.a-wrap{margin-top:18px; padding-top:16px; border-top:1px dashed var(--border); display:none;}
.a-wrap.show{display:block;}
.a-text{font-size:1.15rem; font-weight:800; color:var(--accent); line-height:1.6;}
.tap-hint{margin-top:16px; font-size:.75rem; color:var(--sub); text-align:center;}

.judge-row{display:flex; gap:10px; width:100%; max-width:640px;}
.judge-btn{
  flex:1; padding:13px; border-radius:14px; border:none; font-size:.9rem; font-weight:700; cursor:pointer;
  color:#fff; transition:transform .1s;
}
.judge-btn:active{transform:scale(.97);}
.btn-again{background:var(--warn);}
.btn-good{background:var(--good);}
.nav-row{display:flex; gap:10px; width:100%; max-width:640px; justify-content:center;}
.nav-btn{
  padding:9px 18px; border-radius:12px; border:1px solid var(--border); background:var(--chip);
  color:var(--text); cursor:pointer; font-size:.82rem;
}

/* List mode */
#list-wrap{display:none; flex-direction:column; gap:10px;}
.list-item{
  background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px;
  box-shadow:var(--shadow);
}
.list-q{font-weight:700; font-size:.93rem; margin-bottom:6px;}
.list-a{color:var(--accent); font-weight:700; font-size:.93rem; display:none;}
.list-item.open .list-a{display:block;}
.list-meta{font-size:.66rem; color:var(--sub); margin-bottom:4px;}

.empty-msg{text-align:center; color:var(--sub); padding:40px 10px; font-size:.9rem;}

footer{text-align:center; color:var(--sub); font-size:.72rem; margin-top:30px; padding:0 20px;}

@media (max-width:480px){
  .q-text{font-size:1rem;}
  .a-text{font-size:1.05rem;}
  header h1{font-size:1.08rem;}
}
</style>

};

/* =========================================================
   State
========================================================= */
const STORAGE_KEY = "pe_quiz_progress_v2_13";
let progress = loadProgress();
const ALL_LECTURES = Object.keys(QUIZ_DATA).map(Number).sort((a,b)=>a-b);

let state = {
  lecture: 1,
  order: [],
  pos: 0,
  mode: 'card',
  shuffle: false,
  reviewOnly: false,
  query: ""
};

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {};
}
function saveProgress(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}
function statusOf(lec, idx){
  return progress[lec+"-"+idx] || null;
}

/* =========================================================
   Build tabs
========================================================= */
const tabsEl = document.getElementById('tabs');
const lectureTitleEl = document.getElementById('lecture-title');
function renderTabs(){
  tabsEl.innerHTML = '';
  ALL_LECTURES.forEach(lec=>{
    const b = document.createElement('button');
    b.className = 'tab-btn' + (state.lecture===lec ? ' active':'');
    b.textContent = "第"+lec+"講";
    b.onclick = ()=>{ state.lecture = lec; buildOrder(); render(); };
    tabsEl.appendChild(b);
  });
  const b = document.createElement('button');
  b.className = 'tab-btn' + (state.lecture==='all' ? ' active':'');
  b.textContent = '全講';
  b.onclick = ()=>{ state.lecture = 'all'; buildOrder(); render(); };
  tabsEl.appendChild(b);

  lectureTitleEl.textContent = state.lecture === 'all'
    ? '第1講〜第13講 すべて出題中'
    : QUIZ_DATA[state.lecture].title;
}

/* =========================================================
   Build order (list of {lec, idx}) based on filters
========================================================= */
function buildOrder(){
  let list = [];
  const lecs = state.lecture === 'all' ? ALL_LECTURES : [state.lecture];
  lecs.forEach(lec=>{
    QUIZ_DATA[lec].items.forEach((item, idx)=>{
      const q = item[0], a = item[1];
      if(state.query){
        const s = (q+a).toLowerCase();
        if(!s.includes(state.query.toLowerCase())) return;
      }
      if(state.reviewOnly){
        if(statusOf(lec, idx) !== 'again') return;
      }
      list.push({lec, idx});
    });
  });
  if(state.shuffle){
    for(let i=list.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [list[i], list[j]] = [list[j], list[i]];
    }
  }
  state.order = list;
  state.pos = 0;
}

/* =========================================================
   Rendering
========================================================= */
const flashcard = document.getElementById('flashcard');
const qText = document.getElementById('q-text');
const aWrap = document.getElementById('a-wrap');
const aText = document.getElementById('a-text');
const cardIndex = document.getElementById('card-index');
const cardLectureLabel = document.getElementById('card-lecture-label');
const tapHint = document.getElementById('tap-hint');
const statText = document.getElementById('stat-text');
const statDetail = document.getElementById('stat-detail');
const progressInner = document.getElementById('progress-inner');
const cardWrap = document.getElementById('card-wrap');
const listWrap = document.getElementById('list-wrap');

let revealed = false;

function render(){
  renderTabs();
  updateStats();
  if(state.mode === 'card'){
    cardWrap.style.display = 'flex';
    listWrap.style.display = 'none';
    renderCard();
  }else{
    cardWrap.style.display = 'none';
    listWrap.style.display = 'flex';
    renderList();
  }
}

function renderCard(){
  revealed = false;
  aWrap.classList.remove('show');
  tapHint.textContent = "タップして答えを表示（Spaceキーでも可）";
  if(state.order.length === 0){
    qText.textContent = "該当する問題がありません。フィルタを確認してください。";
    aText.textContent = "";
    cardIndex.textContent = "0 / 0";
    cardLectureLabel.textContent = "-";
    return;
  }
  const {lec, idx} = state.order[state.pos];
  const [q, a] = QUIZ_DATA[lec].items[idx];
  qText.textContent = q;
  aText.textContent = a;
  cardIndex.textContent = (state.pos+1) + " / " + state.order.length;
  cardLectureLabel.textContent = "第" + lec + "講";
}

function renderList(){
  listWrap.innerHTML = '';
  if(state.order.length === 0){
    listWrap.innerHTML = '<div class="empty-msg">該当する問題がありません。フィルタを確認してください。</div>';
    return;
  }
  state.order.forEach(({lec, idx})=>{
    const [q, a] = QUIZ_DATA[lec].items[idx];
    const div = document.createElement('div');
    div.className = 'list-item';
    const st = statusOf(lec, idx);
    const mark = st === 'good' ? '✅' : st === 'again' ? '⭐' : '・';
    div.innerHTML = `
      <div class="list-meta">第${lec}講 ${mark}</div>
      <div class="list-q">Q. ${q}</div>
      <div class="list-a">A. ${a}</div>
    `;
    div.onclick = ()=> div.classList.toggle('open');
    listWrap.appendChild(div);
  });
}

function updateStats(){
  const lecs = state.lecture === 'all' ? ALL_LECTURES : [state.lecture];
  let total=0, good=0, again=0, unseen=0;
  lecs.forEach(lec=>{
    QUIZ_DATA[lec].items.forEach((item, idx)=>{
      total++;
      const st = statusOf(lec, idx);
      if(st==='good') good++;
      else if(st==='again') again++;
      else unseen++;
    });
  });
  statText.textContent = `${state.order.length} 問中 ${state.order.length? state.pos+1 : 0} 問目`;
  statDetail.textContent = `習得 ${good}｜復習 ${again}｜未回答 ${unseen}（全 ${total} 問）`;
  progressInner.style.width = total ? ((good/total)*100)+'%' : '0%';
}

/* =========================================================
   Interactions
========================================================= */
flashcard.addEventListener('click', ()=>{
  revealed = !revealed;
  aWrap.classList.toggle('show', revealed);
  tapHint.textContent = revealed ? "タップして問題に戻る" : "タップして答えを表示（Spaceキーでも可）";
});

document.getElementById('btn-again').onclick = ()=> judge('again');
document.getElementById('btn-good').onclick = ()=> judge('good');

function judge(result){
  if(state.order.length === 0) return;
  const {lec, idx} = state.order[state.pos];
  progress[lec+"-"+idx] = result;
  saveProgress();
  goNext();
}

document.getElementById('btn-next').onclick = goNext;
document.getElementById('btn-prev').onclick = goPrev;

function goNext(){
  if(state.order.length === 0) return;
  state.pos = (state.pos + 1) % state.order.length;
  renderCard();
  updateStats();
}
function goPrev(){
  if(state.order.length === 0) return;
  state.pos = (state.pos - 1 + state.order.length) % state.order.length;
  renderCard();
  updateStats();
}

document.getElementById('mode-toggle').onclick = (e)=>{
  state.mode = state.mode === 'card' ? 'list' : 'card';
  e.target.textContent = state.mode === 'card' ? '📇 カードモード' : '📋 リストモード';
  render();
};

document.getElementById('shuffle-toggle').onclick = (e)=>{
  state.shuffle = !state.shuffle;
  e.target.classList.toggle('on', state.shuffle);
  buildOrder(); render();
};

document.getElementById('review-toggle').onclick = (e)=>{
  state.reviewOnly = !state.reviewOnly;
  e.target.classList.toggle('on', state.reviewOnly);
  buildOrder(); render();
};

document.getElementById('search').addEventListener('input', (e)=>{
  state.query = e.target.value;
  buildOrder(); render();
});

document.getElementById('reset-btn').onclick = ()=>{
  const lecs = state.lecture === 'all' ? ALL_LECTURES : [state.lecture];
  if(!confirm((state.lecture==='all' ? '全講' : '第'+state.lecture+'講') + 'の進捗をリセットします。よろしいですか？')) return;
  lecs.forEach(lec=>{
    QUIZ_DATA[lec].items.forEach((item, idx)=>{
      delete progress[lec+"-"+idx];
    });
  });
  saveProgress();
  render();
};

/* Keyboard shortcuts */
document.addEventListener('keydown', (e)=>{
  if(document.activeElement.id === 'search') return;
  if(state.mode !== 'card') return;
  if(e.code === 'Space'){ e.preventDefault(); flashcard.click(); }
  else if(e.key === '1'){ judge('again'); }
  else if(e.key === '2'){ judge('good'); }
  else if(e.key === 'ArrowRight'){ goNext(); }
  else if(e.key === 'ArrowLeft'){ goPrev(); }
});

/* Theme toggle */
const themeToggle = document.getElementById('theme-toggle');
if(localStorage.getItem('pe_quiz_theme') === 'dark'){ document.body.classList.add('dark'); }
themeToggle.addEventListener('click', ()=>{
  document.body.classList.toggle('dark');
  localStorage.setItem('pe_quiz_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
});

/* Init */
buildOrder();
render();
</script>
</body>
